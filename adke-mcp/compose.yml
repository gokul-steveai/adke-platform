services:
  adke-mcp:
    build: .
    ports:
      - "8000:8000"
    env_file: 
    - .env

  frontend:
    build:
      context: ./../frontend
      dockerfile: Dockerfile
      args:
          - VITE_SUPABASE_URL=${SUPABASE_URL}
          - VITE_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_KEY}
    ports:
      - "5173:80"
    env_file: 
    - ./../frontend/.env
    depends_on:
      - adke-mcp